<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>
<style>
/* Body and background */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #f06, #f79);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

/* Page title */
h1 {
    color: white;
    margin: 20px 0;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
}

/* Gallery container */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
    width: 90%;
    max-width: 1200px;
}

/* Each gallery item */
.gallery-item {
    position: relative;
    overflow: hidden;
    border-radius: 15px;
    cursor: pointer;
    transition: transform 0.5s ease, box-shadow 0.3s ease;
}

/* Image inside gallery */
.gallery-item img {
    width: 100%;
    display: block;
    transition: transform 0.7s ease, filter 0.5s ease;
}

/* Image hover effects */
.gallery-item:hover img {
    transform: scale(1.1) rotate(2deg);
    filter: brightness(1.2) contrast(1.1);
}

/* Overlay gradient effect */
.gallery-item::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(45deg, rgba(255,255,255,0.1), rgba(0,0,0,0.3));
    opacity: 0;
    transition: opacity 0.5s ease;
}

.gallery-item:hover::after {
    opacity: 1;
}

/* Caption text */
.caption {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: white;
    font-weight: bold;
    background-color: rgba(0,0,0,0.5);
    padding: 5px 10px;
    border-radius: 5px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
}

.gallery-item:hover .caption {
    opacity: 1;
    transform: translateY(0);
}

/* Footer */
footer {
    color: white;
    margin: 20px 0;
}

/* Mobile responsive */
@media(max-width:600px){
    .caption {
        font-size: 14px;
        padding: 3px 6px;
    }
}
</style>
</head>
<body>

<h1>My Image Gallery</h1>

<div class="gallery">
    <div class="gallery-item">
        <img src="https://picsum.photos/400/300?random=1" alt="Image 1">
        <div class="caption">Beautiful Landscape</div>
    </div>
    <div class="gallery-item">
        <img src="https://picsum.photos/400/300?random=2" alt="Image 2">
        <div class="caption">Sunset Glow</div>
    </div>
    <div class="gallery-item">
        <img src="https://picsum.photos/400/300?random=3" alt="Image 3">
        <div class="caption">Mountain View</div>
    </div>
    <div class="gallery-item">
        <img src="https://picsum.photos/400/300?random=4" alt="Image 4">
        <div class="caption">Calm Waters</div>
    </div>
    <div class="gallery-item">
        <img src="https://picsum.photos/400/300?random=5" alt="Image 5">
        <div class="caption">City Lights</div>
    </div>
    <div class="gallery-item">
        <img src="https://picsum.photos/400/300?random=6" alt="Image 6">
        <div class="caption">Forest Path</div>
    </div>
</div>

<footer>
    &copy; 2026 My Gallery
</footer>

</body>
</html>
